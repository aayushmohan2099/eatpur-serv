<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | EatPur Admin</title>
  {% load static %}
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'admin_custom/css/dashboard.css' %}">
  <link rel="stylesheet" href="{% static 'admin_custom/css/forms.css' %}">
  <style>
    body {
      display: flex; align-items: center; justify-content: center;
      height: 100vh; background: var(--sidebar-bg); margin: 0;
    }
    .login-box {
      background: var(--surface); padding: 40px; border-radius: var(--radius);
      width: 100%; max-width: 400px; box-shadow: var(--shadow-lg);
    }
    .login-header { text-align: center; margin-bottom: 30px; }
    .login-header .brand-icon { font-size: 40px; margin-bottom: 10px; display: block; }
    .login-header h1 { font-size: 24px; color: var(--text); letter-spacing: -0.5px; }
    .login-header p { color: var(--text-muted); font-size: 14px; margin-top: 4px; }
    .btn-login { width: 100%; padding: 12px; font-size: 14px; justify-content: center; margin-top: 10px; }
    .error-msg { background: var(--danger-soft); color: var(--danger); padding: 10px; border-radius: var(--radius-xs); font-size: 13px; margin-bottom: 20px; text-align: center; }
  </style>
</head>
<body>

  <div class="login-box">
    <div class="login-header">
      <span class="brand-icon">🌿</span>
      <h1>EatPur Workspace</h1>
      <p>Sign in to your staff account</p>
    </div>

    {% if form.errors and not form.non_field_errors %}
      <div class="error-msg">Please correct the errors below.</div>
    {% endif %}
    {% if form.non_field_errors %}
      <div class="error-msg">{{ form.non_field_errors.0 }}</div>
    {% endif %}

    <form action="{{ app_path }}" method="post" id="login-form">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label" for="id_username">Username</label>
        <input type="text" name="username" class="form-control" id="id_username" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label" for="id_password">Password</label>
        <input type="password" name="password" class="form-control" id="id_password" required>
        <input type="hidden" name="next" value="{{ next }}">
      </div>
      <button type="submit" class="btn btn-primary btn-login">Sign In</button>
    </form>
  </div>

</body>
</html>
