<header class="header">
  <div class="header-left">
    <button class="sidebar-toggle" id="toggleSidebar" title="Toggle Sidebar">
      <span></span><span></span><span></span>
    </button>
    <div class="brand">
      <span class="brand-icon">🌿</span>
      <span class="brand-name">Millet</span>
    </div>
  </div>

  <div class="header-center">
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 20 20" fill="none">
        <circle cx="9" cy="9" r="6" stroke="currentColor" stroke-width="1.5"/>
        <path d="M13.5 13.5L17 17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <input type="text" class="search-input" placeholder="Search users, orders, products…" />
    </div>
  </div>

  <div class="header-right">
    <div class="header-badge">
      <span class="role-chip">{{ USER_ROLE }}</span>
    </div>
    <div class="notif-btn" title="Notifications">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6 6 0 00-9.33-5"/>
        <path d="M13.73 21a2 2 0 01-3.46 0"/>
        <circle cx="7" cy="7" r="4"/>
      </svg>
    </div>
    <div class="user-chip">
      <img src="https://ui-avatars.com/api/?name={{ request.user.username|urlencode }}&background=22c55e&color=fff&bold=true&size=36" alt="{{ request.user.username }}" class="avatar"/>
      <span class="username">{{ request.user.username }}</span>
    </div>
  </div>
</header>
